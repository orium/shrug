name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  release:
    name: release ${{ matrix.target }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            zip: none

    steps:
      - uses: actions/checkout@v7

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: shrug
          target: ${{ matrix.target }}
          archive: $bin_$tag_$target
          tar: all
          zip: ${{ matrix.zip }}
          include: README.md,LICENSE.md
          checksum: sha256
          locked: true
